<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donate Plastic</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#e0f7e9;
font-family:Arial;
}

.form-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<h2>Donate Plastic</h2>

<form id="donateForm">

<input class="form-control mb-3" placeholder="Name" required>

<input class="form-control mb-3" placeholder="Phone" required>

<select class="form-control mb-3">

<option>Bottles</option>
<option>Bags</option>

</select>

<input class="form-control mb-3" placeholder="Quantity">

<button class="btn btn-success w-100">
Submit
</button>

</form>

</div>

</div>

<script>

document.getElementById("donateForm").addEventListener("submit",function(e){

e.preventDefault()

let data={
name:this[0].value,
phone:this[1].value,
type:this[2].value,
quantity:this[3].value
}

let list=JSON.parse(localStorage.getItem("donations"))||[]

list.push(data)

localStorage.setItem("donations",JSON.stringify(list))

alert("Donation Submitted")

this.reset()

})

</script>

</body>
</html>
