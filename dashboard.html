<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - EcoSwap</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
}
.sidebar {
    background:#2E7D32;
    min-height:100vh;
    color:white;
}
.sidebar a {
    color:white;
    display:block;
    padding:15px;
    text-decoration:none;
}
.sidebar a:hover {
    background:#1b4f26;
}
.content {
    padding:20px;
}
.card {
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="d-flex">
<div class="sidebar" style="width:220px;">
<h3 class="text-center py-3">EcoSwap Admin</h3>
<a href="#">Dashboard</a>
<a href="#">Users</a>
<a href="#">Donations</a>
<a href="#">Programs</a>
<a href="#">Rewards</a>
<a href="#">Logout</a>
</div>

<div class="content flex-fill">
<h2>Welcome, Admin!</h2>
<div class="row mt-4">
<div class="col-md-4">
<div class="card shadow p-3">
<h5>Total Users</h5>
<p>120</p>
</div>
</div>
<div class="col-md-4">
<div class="card shadow p-3">
<h5>Total Donations</h5>
<p>350</p>
</div>
</div>
<div class="col-md-4">
<div class="card shadow p-3">
<h5>Trees Planted</h5>
<p>45</p>
</div>
</div>
</div>
</div>
</div>

</body>
</html>
