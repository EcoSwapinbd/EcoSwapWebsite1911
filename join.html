<div class="container mt-5">
<h1 class="text-center mb-4">Join EcoSwap</h1>
<form class="mx-auto" style="max-width:600px;">
  <div class="mb-3">
    <input type="text" class="form-control" placeholder="Full Name" required>
  </div>
  <div class="mb-3">
    <input type="email" class="form-control" placeholder="Email" required>
  </div>
  <div class="mb-3">
    <input type="tel" class="form-control" placeholder="Phone" required>
  </div>
  <div class="mb-3">
    <select class="form-select" required>
      <option selected disabled>Select Contribution Type</option>
      <option value="bottles">Plastic Bottles</option>
      <option value="bags">Plastic Bags</option>
    </select>
  </div>
  <div class="mb-3">
    <input type="file" class="form-control">
  </div>
  <button type="submit" class="btn btn-success w-100">Join Now</button>
</form>
