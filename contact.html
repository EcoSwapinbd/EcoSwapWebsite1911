<style>
body{
    font-family: Arial, sans-serif;
    background: #e0f7e9; /* হালকা গ্রিন ব্যাকগ্রাউন্ড */
}

.header{
    background: #2E7D32;
    color: white;
    text-align: center;
    padding: 50px 20px;
}

.section-title{
    text-align:center;
    color:#2E7D32;
    font-weight:bold;
    margin-bottom:40px;
}

.form-control, .form-select{
    border-radius:10px;
}

.btn-custom{
    border-radius:10px;
}

.footer{
    background:#2E7D32;
    color:white;
    padding:20px;
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
<div class="container">
<a class="navbar-brand" href="index.html">
      <img src="logo (2).png" alt="EcoSwap Logo" width="50">
</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

<li class="nav-item"><a class="btn btn-warning text-white ms-2" href="donate.html">Donate</a></li>
</ul>
</div>
</div>
</nav>

<!-- Header -->
<div class="header">
<h1>Contact Us</h1>
<p>We would love to hear from you! Send us a message below.</p>
</div>

<!-- Contact Form Section -->
<section class="container mt-5">
<h2 class="section-title">Get In Touch</h2>
<form class="mx-auto" style="max-width:700px;">
<div class="row mb-3">
<div class="col-md-6 mb-3 mb-md-0">
<input type="text" class="form-control" placeholder="Full Name" required>
</div>
<div class="col-md-6">
<input type="email" class="form-control" placeholder="Email" required>
</div>
</div>
<div class="row mb-3">
<div class="col-md-6 mb-3 mb-md-0">
<input type="tel" class="form-control" placeholder="Phone" required>
</div>
<div class="col-md-6">
<select class="form-select" required>
<option selected disabled>Reason for Contact</option>
<option value="inquiry">General Inquiry</option>
<option value="support">Support</option>
<option value="feedback">Feedback</option>
</select>
</div>
</div>
<div class="mb-3">
<textarea class="form-control" rows="4" placeholder="Your Message" required></textarea>
</div>
<button type="submit" class="btn btn-success w-100 btn-custom">Send Message</button>
</form>
</section>

<!-- Footer -->
<div class="footer">
<p>© 2026 EcoSwap | Green Planet Initiative</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
